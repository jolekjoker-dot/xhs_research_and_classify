<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — XHS KB</title>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; overflow: hidden; }
  #topbar { display: flex; align-items: center; padding: 10px 20px; background: #16213e; gap: 16px; border-bottom: 1px solid #333; }
  #topbar h1 { font-size: 16px; color: #e0e0e0; }
  #topbar input { padding: 4px 10px; border: 1px solid #444; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; width: 220px; }
  #topbar input:focus { outline: none; border-color: #5470c6; }
  #legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 6px 20px; background: #16213e; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
  .leg b { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  #main { width: 100vw; height: calc(100vh - 78px); }
  #foot { position: fixed; bottom: 10px; right: 16px; color: #666; font-size: 11px; z-index: 10; }
</style>
</head>
<body>
<div id="topbar">
  <h1>XHS Knowledge Graph</h1>
  <input id="search" type="text" placeholder="搜索节点..." autocomplete="off">
  <span id="msg" style="color:#91cc75;font-size:12px;margin-left:auto"></span>
</div>
<div id="legend"></div>
<div id="main"></div>
<div id="foot"></div>

<script>
try {
  const msg = document.getElementById("msg");
  const main = document.getElementById("main");
  const foot = document.getElementById("foot");

  if (typeof echarts === "undefined") throw new Error("ECharts CDN 未加载");

  msg.textContent = "加载数据...";

  fetch("graph_viz.json")
    .then(r => r.json())
    .then(data => {
      if (!data.nodes.length) {
        msg.textContent = "无数据";
        msg.style.color = "#fac858";
        return;
      }

      msg.textContent = `${data.nodes.length} 节点 | ${data.edges.length} 边`;
      foot.textContent = `节点: ${data.nodes.length} | 边: ${data.edges.length}`;

      // categories with numeric index for ECharts compatibility
      const catList = [];
      const catIdx = {};
      data.nodes.forEach(n => {
        if (!(n.category in catIdx)) {
          catIdx[n.category] = catList.length;
          catList.push({ name: n.category, itemStyle: { color: n.itemStyle?.color || "#999" } });
        }
      });
      // convert category name to index on each node
      data.nodes.forEach(n => {
        n.category = catIdx[n.category];
      });

      // legend
      const leg = document.getElementById("legend");
      catList.forEach(c => {
        const s = document.createElement("span");
        s.className = "leg";
        s.innerHTML = `<b style="background:${c.itemStyle.color}"></b>${c.name}`;
        leg.appendChild(s);
      });

      // chart
      const chart = echarts.init(main);
      chart.setOption({
        backgroundColor: "#1a1a2e",
        animation: true,
        series: [{
          type: "graph",
          layout: "force",
          roam: true,
          draggable: true,
          force: { repulsion: 200, gravity: 0.08, edgeLength: [40, 120], initIterations: 100 },
          data: data.nodes,
          edges: data.edges.map(e => ({
            source: e.source,
            target: e.target,
            lineStyle: {
              color: e.type === "similar" ? "#ee6666" : e.type === "entity" ? "#73c0de" : "#444",
              opacity: 0.25,
              width: e.type === "similar" ? 1.5 : 0.4,
            },
          })),
          categories: catList,
          emphasis: { focus: "adjacency", lineStyle: { width: 3 } },
          label: { show: true, fontSize: 10, color: "#aaa", overflow: "truncate", width: 80 },
        }],
      });

      chart.on("click", p => {
        if (p.dataType === "node") {
          const cat = catList[p.data.category]?.name || "";
          foot.textContent = `${p.name} | ${cat}`;
        }
      });

      // search
      document.getElementById("search").addEventListener("input", () => {
        const q = document.getElementById("search").value.trim().toLowerCase();
        chart.setOption({
          series: [{
            data: data.nodes.map(n => ({
              ...n,
              itemStyle: { ...n.itemStyle, opacity: (!q || n.name.toLowerCase().includes(q)) ? 1 : 0.06 },
            })),
          }],
        });
      });

      window.addEventListener("resize", () => chart.resize());
    })
    .catch(e => {
      msg.textContent = "数据加载失败: " + e.message;
      msg.style.color = "#ee6666";
    });

} catch (e) {
  document.getElementById("msg").textContent = "错误: " + e.message;
  document.getElementById("msg").style.color = "#ee6666";
}
</script>
</body>
</html>
