<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — XHS KB</title>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
    overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 40px,
      rgba(148,163,184,0.04) 40px, rgba(148,163,184,0.04) 42px
    ),
    repeating-linear-gradient(
      -45deg, transparent, transparent 40px,
      rgba(148,163,184,0.04) 40px, rgba(148,163,184,0.04) 42px
    );
    pointer-events: none; z-index: 0;
  }
  #topbar {
    display: flex; align-items: center; padding: 10px 20px;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
    gap: 16px; border-bottom: 1px solid #e2e8f0;
    position: relative; z-index: 1;
  }
  #topbar h1 { font-size: 16px; color: #1e293b; }
  #topbar input {
    padding: 4px 10px; border: 1px solid #cbd5e1; border-radius: 4px;
    background: #fff; color: #334155; width: 220px;
  }
  #topbar input:focus { outline: none; border-color: #2563eb; }
  #legend {
    display: flex; gap: 10px; flex-wrap: wrap; padding: 6px 20px;
    background: rgba(255,255,255,0.7); border-bottom: 1px solid #e2e8f0;
    position: relative; z-index: 1;
  }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b; }
  .leg b { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  #main { width: 100vw; height: calc(100vh - 78px); position: relative; z-index: 1; background: #f8fafc; }
  #main canvas { background: #f8fafc !important; }
  #foot { position: fixed; bottom: 10px; right: 16px; color: #94a3b8; font-size: 11px; z-index: 10; }
</style>
</head>
<body>
<div id="topbar">
  <h1>XHS Knowledge Graph</h1>
  <input id="search" type="text" placeholder="搜索节点..." autocomplete="off">
  <span id="msg" style="color:#16a34a;font-size:12px;margin-left:auto"></span>
</div>
<div id="legend"></div>
<div id="main"></div>
<div id="foot"></div>

<script>
try {
  const msg = document.getElementById("msg");
  const main = document.getElementById("main");
  const foot = document.getElementById("foot");

  if (typeof echarts === "undefined") throw new Error("ECharts CDN 未加载");

  msg.textContent = "加载数据...";

  fetch("graph_viz.json")
    .then(r => r.json())
    .then(data => {
      if (!data.nodes.length) {
        msg.textContent = "无数据";
        msg.style.color = "#a16207";
        return;
      }

      msg.textContent = `${data.nodes.length} 节点 | ${data.edges.length} 边`;
      foot.textContent = `节点: ${data.nodes.length} | 边: ${data.edges.length}`;

      // categories with numeric index for ECharts compatibility
      const catList = [];
      const catIdx = {};
      data.nodes.forEach(n => {
        if (!(n.category in catIdx)) {
          catIdx[n.category] = catList.length;
          catList.push({ name: n.category, itemStyle: { color: n.itemStyle?.color || "#999" } });
        }
      });
      // convert category name to index on each node
      data.nodes.forEach(n => {
        n.category = catIdx[n.category];
      });

      // legend
      const leg = document.getElementById("legend");
      catList.forEach(c => {
        const s = document.createElement("span");
        s.className = "leg";
        s.innerHTML = `<b style="background:${c.itemStyle.color}"></b>${c.name}`;
        leg.appendChild(s);
      });

      // chart
      const chart = echarts.init(main);
      chart.setOption({
        backgroundColor: "#f8fafc",
        animation: true,
        series: [{
          type: "graph",
          layout: "force",
          roam: true,
          draggable: true,
          force: { repulsion: 200, gravity: 0.08, edgeLength: [40, 120], initIterations: 100 },
          data: data.nodes,
          edges: data.edges.map(e => ({
            source: e.source,
            target: e.target,
            lineStyle: {
              color: e.type === "similar" ? "#dc2626" : e.type === "entity" ? "#2563eb" : "#cbd5e1",
              opacity: 0.35,
              width: e.type === "similar" ? 1.5 : 0.4,
            },
          })),
          categories: catList,
          emphasis: { focus: "adjacency", lineStyle: { width: 3 } },
          label: { show: true, fontSize: 10, color: "#475569", overflow: "truncate", width: 80 },
        }],
      });

      chart.on("click", p => {
        if (p.dataType === "node") {
          const cat = catList[p.data.category]?.name || "";
          foot.textContent = `${p.name} | ${cat}`;
        }
      });

      // search
      document.getElementById("search").addEventListener("input", () => {
        const q = document.getElementById("search").value.trim().toLowerCase();
        chart.setOption({
          backgroundColor: "#f8fafc",
          series: [{
            data: data.nodes.map(n => ({
              ...n,
              itemStyle: { ...n.itemStyle, opacity: (!q || n.name.toLowerCase().includes(q)) ? 1 : 0.1 },
            })),
          }],
        });
      });

      window.addEventListener("resize", () => chart.resize());
    })
    .catch(e => {
      msg.textContent = "数据加载失败: " + e.message;
      msg.style.color = "#ee6666";
    });

} catch (e) {
  document.getElementById("msg").textContent = "错误: " + e.message;
  document.getElementById("msg").style.color = "#ee6666";
}
</script>
</body>
</html>
