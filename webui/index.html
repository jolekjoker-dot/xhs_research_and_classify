<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XHS Knowledge Base</title>
<script src="https://cdn.bootcdn.net/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b0d14;
    color: #c8cdd8;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    background: linear-gradient(180deg, #111620 0%, #0d1018 100%);
    border-bottom: 1px solid #1e2433;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  nav button {
    padding: 10px 20px;
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    color: #6b7280;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }
  nav button:hover { color: #d1d5db; background: rgba(255,255,255,0.04); }
  nav button.active {
    color: #e8ecef;
    background: rgba(84,112,198,0.12);
    border-color: rgba(84,112,198,0.3);
    box-shadow: 0 0 0 1px rgba(84,112,198,0.08);
  }

  /* ── Tabs ── */
  .tab { display: none; padding: 28px 24px; max-width: 900px; margin: 0 auto; }
  .tab.active { display: block; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #e4e7ee; }
  h3 { font-size: 15px; font-weight: 600; margin: 24px 0 12px; color: #d0d4dd; }

  /* ── Form elements ── */
  input, button {
    padding: 10px 16px;
    border: 1px solid #262d3d;
    border-radius: 8px;
    background: #121620;
    color: #d0d4dd;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  input:focus { outline: none; border-color: #5470c6; box-shadow: 0 0 0 3px rgba(84,112,198,0.15); }
  input::placeholder { color: #4a5060; }
  button {
    cursor: pointer;
    background: #5470c6;
    border-color: #5470c6;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
    transition: all 0.15s ease;
  }
  button:hover { background: #6580d4; border-color: #6580d4; }
  button:active { transform: scale(0.98); }
  button.secondary { background: #1e2433; border-color: #2d3548; color: #a0a8b8; }
  button.secondary:hover { background: #262d3d; }

  .row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  .row input { flex: 1; }
  .row input[type="number"] { flex: 0; width: 72px; text-align: center; }

  /* ── Cards ── */
  .result { margin-top: 20px; }
  .card {
    background: #111620;
    border: 1px solid #1e2433;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color 0.15s ease;
  }
  .card:hover { border-color: #2d3548; }
  .card h4 { font-size: 14px; font-weight: 600; color: #91cc75; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .card p { font-size: 13px; color: #8892a4; line-height: 1.55; }
  .card .meta { font-size: 11.5px; color: #5a6375; margin-top: 8px; }
  .card a { color: #73a0de; text-decoration: none; }
  .card a:hover { text-decoration: underline; }

  /* ── Tags ── */
  .score {
    display: inline-flex; align-items: center;
    background: rgba(250,200,88,0.1); color: #fac858;
    padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .method-tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500;
    background: rgba(115,192,222,0.12); color: #73c0de;
  }

  /* ── QA ── */
  .answer-box {
    background: #111620; border: 1px solid #1e2433; border-radius: 10px;
    padding: 20px 22px; line-height: 1.75; font-size: 14px;
  }
  .answer-box h1, .answer-box h2, .answer-box h3 { color: #e4e7ee; margin: 16px 0 8px; }
  .answer-box h1 { font-size: 18px; } .answer-box h2 { font-size: 16px; } .answer-box h3 { font-size: 14px; }
  .answer-box p { margin: 6px 0; }
  .answer-box ul, .answer-box ol { padding-left: 20px; margin: 6px 0; }
  .answer-box li { margin: 2px 0; }
  .answer-box strong { color: #e4e7ee; }
  .answer-box code { background: #1a1d2a; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .answer-box pre { background: #0a0c12; padding: 12px; border-radius: 8px; overflow-x: auto; }
  .answer-box blockquote { border-left: 3px solid #5470c6; padding-left: 12px; color: #8892a4; margin: 8px 0; }
  .answer-box a { color: #73a0de; }
  .sources {
    margin-top: 14px; font-size: 12px; color: #6b7280;
    background: rgba(84,112,198,0.05); border: 1px solid #1e2433;
    border-radius: 8px; padding: 12px 16px;
  }
  .sources span { color: #73a0de; }

  /* ── Image grid ── */
  .img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px;
  }
  .img-card {
    background: #111620; border: 1px solid #1e2433; border-radius: 10px;
    overflow: hidden; transition: all 0.2s ease; cursor: pointer;
  }
  .img-card:hover { border-color: #3d4a63; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .img-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
  .img-card .info { padding: 12px 14px; }
  .img-card .info h4 { font-size: 13px; font-weight: 600; color: #91cc75; margin-bottom: 4px; }
  .img-card .info p { color: #6b7280; font-size: 11px; }

  /* ── States ── */
  .loading {
    color: #fac858; text-align: center; padding: 32px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .loading::before {
    content: ''; width: 18px; height: 18px; border: 2px solid #333;
    border-top-color: #fac858; border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    color: #f87171; background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2); border-radius: 10px; padding: 14px 18px;
  }

  /* ── Pipeline ── */
  #pipeline-log {
    background: #0a0c12; border: 1px solid #1e2433; border-radius: 10px;
    padding: 16px 20px; font-family: "Cascadia Code", "Consolas", monospace;
    font-size: 12.5px; color: #91cc75; max-height: 320px; overflow-y: auto;
    white-space: pre-wrap; margin-top: 12px; line-height: 1.6;
  }

  /* ── Lightbox ── */
  .lightbox { display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:200;justify-content:center;align-items:center;cursor:pointer; }
  .lightbox.show { display:flex; }
  .lightbox img { max-width:92vw; max-height:92vh; border-radius:8px; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
  .lightbox .close { position:absolute;top:16px;right:24px;color:#aaa;font-size:32px;cursor:pointer; }
  .lightbox .close:hover { color:#fff; }

  /* ── Graph ── */
  #tab-graph { padding: 0; max-width: none; }
  #graphFrame { width: 100%; height: calc(100vh - 52px); border: none; }
</style>
</head>
<body>

<nav>
  <button class="active" onclick="switchTab('home')">🏠 主页</button>
  <button onclick="switchTab('qa')">💬 RAG问答</button>
  <button onclick="switchTab('graph')">🕸️ 知识图谱</button>
  <button onclick="switchTab('images')">🖼️ 文搜图</button>
</nav>

<!-- Tab: Home -->
<div id="tab-home" class="tab active">
  <h2>搜索知识库</h2>
  <div class="row">
    <input id="search-query" placeholder="输入关键词搜索..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">搜索</button>
  </div>
  <div id="search-result"></div>

  <h3>抓取小红书</h3>
  <div class="row">
    <input id="pipeline-kw" placeholder="输入搜索关键词...">
    <input id="pipeline-cnt" type="number" value="3" min="1" max="10">
    <button onclick="doPipeline()">一键抓取</button>
  </div>
  <div id="pipeline-log" style="display:none"></div>
</div>

<!-- Tab: QA -->
<div id="tab-qa" class="tab">
  <h2>RAG 问答</h2>
  <div class="row">
    <input id="qa-question" placeholder="向知识库提问..." onkeydown="if(event.key==='Enter')doAsk()">
    <button onclick="doAsk()">提问</button>
  </div>
  <div id="qa-result"></div>
</div>

<!-- Tab: Graph -->
<div id="tab-graph" class="tab">
  <iframe id="graphFrame" src="/graph.html"></iframe>
</div>

<!-- Tab: Image Search -->
<div id="tab-images" class="tab">
  <h2>文搜图</h2>
  <div class="row">
    <input id="img-query" placeholder="描述你想找的图片..." onkeydown="if(event.key==='Enter')doImgSearch()">
    <button onclick="doImgSearch()">搜索图片</button>
  </div>
  <div id="img-result"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close">&times;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const labels = {home:'主页', qa:'问答', graph:'图谱', images:'搜图'};
  document.querySelectorAll('nav button').forEach(b => {
    if (b.textContent.includes(labels[name])) b.classList.add('active');
  });
}

async function api(path, params) {
  const qs = new URLSearchParams(params).toString();
  const resp = await fetch('/api/' + path + '?' + qs);
  if (!resp.ok) throw new Error((await resp.json()).error || resp.statusText);
  return resp.json();
}

async function doSearch() {
  const q = document.getElementById('search-query').value.trim();
  if (!q) return;
  const el = document.getElementById('search-result');
  el.innerHTML = '<div class="loading">搜索中...</div>';
  try {
    const data = await api('search', {query: q, top_k: 10});
    let html = '';
    data.results.forEach((r, i) => {
      html += `<div class="card">
        <h4>${i+1}. ${r.title || '未知'}
          <span class="score">${(r.score*100).toFixed(0)}%</span>
          <span class="method-tag">${r.method}</span>
        </h4>
        <p>${(r.content||'').substring(0,200)}</p>
        <div class="meta">${r.category || ''} ${r.url ? '· <a href="'+r.url+'" target="_blank">原文 &nearr;</a>' : ''}</div>
      </div>`;
    });
    el.innerHTML = html || '<p style="color:#6b7280;text-align:center;padding:32px">未找到结果</p>';
  } catch (e) {
    el.innerHTML = '<div class="error">搜索失败: ' + e.message + '</div>';
  }
}

async function doAsk() {
  const q = document.getElementById('qa-question').value.trim();
  if (!q) return;
  const el = document.getElementById('qa-result');
  el.innerHTML = '<div class="loading">思考中...</div>';
  try {
    const data = await api('ask', {question: q, top_k: 5});
    let answerHtml = typeof marked !== 'undefined'
      ? marked.parse(data.answer)
      : data.answer.replace(/</g,'&lt;').replace(/\n/g,'<br>');
    let html = '<div class="answer-box">' + answerHtml + '</div>';
    if (data.sources.length) {
      html += '<div class="sources">📄 引用来源: ';
      html += data.sources.map(s => `<span>${s.title}</span> (${(s.score*100).toFixed(0)}%)`).join(' &nbsp;·&nbsp; ');
      html += '</div>';
    }
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div class="error">问答失败: ' + e.message + '</div>';
  }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

async function doImgSearch() {
  const q = document.getElementById('img-query').value.trim();
  if (!q) return;
  const el = document.getElementById('img-result');
  el.innerHTML = '<div class="loading">搜索图片...</div>';
  try {
    const data = await api('search-images', {query: q, top_k: 10});
    let html = '<div class="img-grid">';
    data.results.forEach(r => {
      const imgSrc = '/images/' + r.image_path.split('/').pop();
      html += `<div class="img-card" onclick="openLightbox('${imgSrc}')">
        <img src="${imgSrc}" alt="${r.post_title||''}" loading="lazy"
             onerror="this.style.background='#1a1d2a';this.style.height='150px'">
        <div class="info">
          <h4>${(r.post_title||'').substring(0,40)}</h4>
          <p><span class="score" style="font-size:10px">${(r.score*100).toFixed(1)}%</span> &nbsp;${r.category||''}</p>
          <p style="margin-top:6px;color:#5a6375">${(r.content||'').substring(0,80)}</p>
        </div>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html || '<p style="color:#6b7280;text-align:center;padding:32px">未找到匹配图片</p>';
  } catch (e) {
    el.innerHTML = '<div class="error">搜图失败: ' + e.message + '</div>';
  }
}

async function doPipeline() {
  const kw = document.getElementById('pipeline-kw').value.trim();
  const cnt = parseInt(document.getElementById('pipeline-cnt').value) || 3;
  if (!kw) return;
  const log = document.getElementById('pipeline-log');
  log.style.display = 'block';
  log.textContent = '搜索中...\n';
  try {
    const resp = await fetch('/api/pipeline?keyword=' + encodeURIComponent(kw) + '&count=' + cnt, {method: 'POST'});
    const data = await resp.json();
    log.textContent += `搜索完成: ${data.results_found} 条结果。\n\n`;
    log.textContent += `完整 Pipeline (抓取+格式化+分类+构建) 请在终端运行:\n`;
    log.textContent += `    python xiaohongshu.py run --keywords "${kw}" --count ${cnt}\n`;
    log.textContent += `或通过 MCP 工具: run_pipeline(keyword="${kw}", count=${cnt})`;
  } catch (e) {
    log.textContent += '错误: ' + e.message;
  }
}
</script>
</body>
</html>
